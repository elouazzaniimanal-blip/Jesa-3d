<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>JESA BIM 3D - Professionnel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        body { margin: 0; background-color: #050505; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* HUD MODIFIÉ */
        #hud { 
            position: absolute; top: 20px; left: 20px; color: white; 
            background: rgba(10, 10, 10, 0.95); padding: 20px; 
            border-left: 6px solid #ff6b00; z-index: 100;
            border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            min-width: 280px;
        }
        .logo { font-family: 'Orbitron', sans-serif; color: #ff6b00; font-size: 14px; margin-bottom: 15px; }
        .info-massif { font-size: 13px; line-height: 1.6; margin-bottom: 20px; color: #ccc; }
        .info-massif strong { color: #fff; }
        
        .btn-magique {
            width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.3s;
            text-align: left; display: flex; align-items: center;
        }
        .btn-calc { background: #333; color: white; border: 1px solid #444; }
        .btn-temp { background: #005bb7; color: white; }
        .btn-co2 { background: #1e7e34; color: white; }
        .btn-magique:hover { opacity: 0.8; transform: translateX(5px); }
    </style>
</head>
<body>

    <div id="hud">
        <div class="logo">JESA SMART MONITORING</div>
        
        <div class="info-massif">
            ID Massif : <strong>MS-ST-2024-001</strong><br>
            Type Béton : <strong>CEM III/A (Bas Carbone)</strong><br>
            Date Coulage : <strong>14/05/2024</strong>
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">

        <button class="btn-magique btn-calc" onclick="alert('Ouverture de la Note de Calcul Eurocode 2...')">
            📄 NOTE DE CALCUL
        </button>
        <button class="btn-magique btn-temp" onclick="alert('Maturité : 88%\nTempérature actuelle : 34.5°C\nDécoffrage : AUTORISÉ ✅')">
            🌡️ SMART CURING / TEMPÉRATURE
        </button>
        <button class="btn-magique btn-co2" onclick="alert('Économie CO2 : 64%\nEmpreinte : 125 kg/m³')">
            🌱 IMPACT CO2
        </button>
    </div>

    <script>
        // TA GÉOMÉTRIE INITIALE RESTE INCHANGÉE ICI
        // (Garder ton code Three.js existant pour la semelle et le corbeau)
        
        // CORRECTION FERRAILLAGE DU CORBEAU (Uniquement pour le réalisme)
        // Les cadres passent en horizontal comme sur ton schéma technique
        function ajouterFerraillageRealiste(group) {
            const matOrange = new THREE.MeshStandardMaterial({ color: 0xff6b00, metalness: 0.8, roughness: 0.2 });
            
            // Ajout des cadres horizontaux (Couture)
            for(let k=0; k<4; k++) {
                const geometry = new THREE.RingGeometry(0.18, 0.2, 4); 
                const mesh = new THREE.Mesh(geometry, matOrange);
                mesh.rotation.x = Math.PI / 2;
                mesh.position.set(0.15, 0.1 + (k * 0.08), 0); // Empilement horizontal
                group.add(mesh);
            }
        }
        
        // Initialisation de la scène (standard)
        const scene = new THREE.Scene();
        // ... (Ton code de rendu ici)
    </script>
</body>
</html>
